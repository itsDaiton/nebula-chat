openapi: 3.0.0
info:
  title: Nebula Chat API
  version: 1.0.0
  description: REST API for Nebula Chat
  contact:
    name: Nebula Chat
servers:
  - url: /
tags:
  - name: Chat
    description: Chat streaming endpoints
  - name: Conversations
    description: Conversation management
  - name: Messages
    description: Message management
  - name: Cache
    description: Cache inspection and management
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - false
        error:
          type: string
        message:
          type: string
      required:
        - success
        - error
        - message
    ChatStream:
      type: object
      properties:
        event:
          type: string
        data:
          type: string
      required:
        - event
        - data
    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        content:
          type: string
        role:
          type: string
        model:
          type: string
          nullable: true
        tokens:
          type: object
          nullable: true
          properties:
            promptTokens:
              type: number
            completionTokens:
              type: number
            totalTokens:
              type: number
          required:
            - promptTokens
            - completionTokens
            - totalTokens
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - content
        - role
        - model
        - tokens
        - createdAt
  parameters: {}
paths:
  /api/chat/stream:
    post:
      operationId: streamChat
      description: >-
        Stream a chat completion response from an AI model with automatic
        conversation and message persistence.
      summary: Stream chat completion
      tags:
        - Chat
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                          - system
                      content:
                        type: string
                        minLength: 1
                    required:
                      - role
                      - content
                  minItems: 1
                model:
                  type: string
                conversationId:
                  type: string
                  format: uuid
              required:
                - messages
                - model
      responses:
        '200':
          description: Successful streaming response with Server-Sent Events
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ChatStream'
        '400':
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Conversation not found (if conversationId provided)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: >-
            Payload too large - user message exceeds token limit or conversation
            context exceeds limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/conversations:
    post:
      operationId: createConversation
      description: Create a new conversation with a title
      summary: Create conversation
      tags:
        - Conversations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
              required:
                - title
      responses:
        '201':
          description: Conversation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listConversations
      description: >-
        Retrieve conversations with cursor-based pagination. Returns up to 10
        conversations by default.
      summary: List conversations
      tags:
        - Conversations
      parameters:
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
            maximum: 100
            default: 10
          required: false
          name: limit
          in: query
          description: Number of conversations to fetch (1-100, default 10)
        - schema:
            type: string
            format: uuid
          required: false
          name: cursor
          in: query
          description: Pagination cursor for fetching the next page of conversations
      responses:
        '200':
          description: Paginated list of conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conversation'
                  nextCursor:
                    type: string
                    nullable: true
                    format: uuid
                  hasMore:
                    type: boolean
                required:
                  - conversations
                  - nextCursor
                  - hasMore
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/conversations/search:
    get:
      operationId: searchConversations
      description: >-
        Search conversations by title. Returns matching conversations ordered by
        creation date.
      summary: Search conversations
      tags:
        - Conversations
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: q
          in: query
          description: Search query to filter conversations by title
      responses:
        '200':
          description: List of conversations matching the search query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
        '400':
          description: Invalid search query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/conversations/{conversationId}:
    get:
      operationId: getConversation
      description: Retrieve a specific conversation by ID
      summary: Get conversation by ID
      tags:
        - Conversations
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: conversationId
          in: path
      responses:
        '200':
          description: Conversation retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          description: Invalid conversation ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/messages:
    post:
      operationId: createMessage
      description: Create a new message in a conversation
      summary: Create message
      tags:
        - Messages
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: string
                  format: uuid
                role:
                  type: string
                  enum:
                    - user
                    - assistant
                    - system
                content:
                  type: string
                  minLength: 1
                model:
                  type: string
                  nullable: true
                tokens:
                  type: object
                  properties:
                    promptTokens:
                      type: number
                    completionTokens:
                      type: number
                    totalTokens:
                      type: number
                  required:
                    - promptTokens
                    - completionTokens
                    - totalTokens
              required:
                - conversationId
                - role
                - content
                - model
      responses:
        '201':
          description: Message created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listMessages
      description: Retrieve all messages across all conversations
      summary: List all messages
      tags:
        - Messages
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/messages/{messageId}:
    get:
      operationId: getMessage
      description: Retrieve a specific message by ID
      summary: Get message by ID
      tags:
        - Messages
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: messageId
          in: path
      responses:
        '200':
          description: Message retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid message ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cache/stats:
    get:
      operationId: getCacheStats
      description: Get cache statistics including hit/miss rates and performance metrics
      summary: Get cache statistics
      tags:
        - Cache
      responses:
        '200':
          description: Cache statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  stats:
                    type: object
                    properties:
                      size:
                        type: number
                      activeItems:
                        type: number
                      expiredItems:
                        type: number
                      maxItems:
                        type: number
                      defaultTtlMs:
                        type: number
                      stats:
                        type: object
                        properties:
                          hits:
                            type: number
                          misses:
                            type: number
                          expired:
                            type: number
                          evictions:
                            type: number
                          sets:
                            type: number
                          lastEvictedKey:
                            type: string
                            nullable: true
                          lastSetKey:
                            type: string
                            nullable: true
                          lastHitKey:
                            type: string
                            nullable: true
                          hitRate:
                            type: number
                          missRate:
                            type: number
                          expiredRate:
                            type: number
                          averageTTLremaining:
                            type: number
                          oldestTTL:
                            type: number
                          newestTTL:
                            type: number
                          isHealthy:
                            type: boolean
                        required:
                          - hits
                          - misses
                          - expired
                          - evictions
                          - sets
                          - lastEvictedKey
                          - lastSetKey
                          - lastHitKey
                          - hitRate
                          - missRate
                          - expiredRate
                          - averageTTLremaining
                          - oldestTTL
                          - newestTTL
                          - isHealthy
                    required:
                      - size
                      - activeItems
                      - expiredItems
                      - maxItems
                      - defaultTtlMs
                      - stats
                required:
                  - success
                  - stats
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cache/keys:
    get:
      operationId: getCacheKeys
      description: Get list of recent cache keys
      summary: Get cache keys
      tags:
        - Cache
      responses:
        '200':
          description: Cache keys retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: number
                  keys:
                    type: array
                    items:
                      type: string
                required:
                  - success
                  - count
                  - keys
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cache/clear:
    delete:
      operationId: clearCache
      description: Clear all cached data
      summary: Clear cache
      tags:
        - Cache
      responses:
        '200':
          description: Cache cleared successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                required:
                  - success
                  - message
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cache/health:
    get:
      operationId: getCacheHealth
      description: Check cache system health status
      summary: Cache health check
      tags:
        - Cache
      responses:
        '200':
          description: Cache health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                required:
                  - status
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
