                  content:
                    type: string
                  role:
                    type: string
                  model:
                    nullable: true
                    type: string
                  tokens:
                    nullable: true
                    type: object
                    properties:
                      promptTokens:
                        type: number
                      completionTokens:
                        type: number
                      totalTokens:
                        type: number
                    required:
                      - promptTokens
                      - completionTokens
                      - totalTokens
                    additionalProperties: false
                  createdAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - id
                  - conversationId
                  - content
                  - role
                  - model
                  - tokens
                  - createdAt
                additionalProperties: false
                description: Message created successfully
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Invalid request body
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
