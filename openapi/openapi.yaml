  /api/messages/:
    post:
      operationId: createMessage
      summary: Create message
      tags:
        - Messages
      description: Create a new message in a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                role:
                  type: string
                  enum:
                    - user
                    - assistant
                    - system
                content:
                  type: string
                  minLength: 1
                model:
                  nullable: true
                  type: string
                tokens:
                  type: object
                  properties:
                    promptTokens:
                      type: number
                    completionTokens:
                      type: number
                    totalTokens:
                      type: number
                  required:
                    - promptTokens
                    - completionTokens
                    - totalTokens
              required:
                - conversationId
                - role
                - content
                - model
      responses:
        "201":
          description: Message created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
