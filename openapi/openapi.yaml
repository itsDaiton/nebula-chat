openapi: 3.0.0
info:
  title: Nebula Chat API
  version: 1.1.0
  description: REST API for Nebula Chat
  contact:
    name: Nebula Chat
components:
  schemas: {}
paths:
  /:
    get:
      summary: API root
      tags:
        - Health
      description: Welcome endpoint — confirms the API is reachable.
      responses:
        "200":
          description: API is reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
                additionalProperties: false
                description: API is reachable
  /health:
    get:
      summary: Health check
      tags:
        - Health
      description: Returns server liveness status and current UTC timestamp.
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                  timestamp:
                    type: string
                required:
                  - status
                  - timestamp
                additionalProperties: false
                description: Server is healthy
  /api/chat/stream:
    post:
      operationId: streamChat
      summary: Stream chat completion
      tags:
        - Chat
      description: Stream a chat completion response from an AI model with automatic
        conversation and message persistence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                          - system
                      content:
                        type: string
                        minLength: 1
                    required:
                      - role
                      - content
                model:
                  type: string
                conversationId:
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
              required:
                - messages
                - model
      responses:
        "400":
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Invalid request body or validation error
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Conversation not found
        "413":
          description: Message or context exceeds token limit
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Message or context exceeds token limit
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Rate limit exceeded
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Internal server error
  /api/conversations/:
    post:
      operationId: createConversation
      summary: Create conversation
      tags:
        - Conversations
      description: Create a new conversation with a title
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
              required:
                - title
      responses:
        "201":
          description: Conversation created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                  title:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                    pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - id
                  - title
                  - createdAt
                additionalProperties: false
                description: Conversation created successfully
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Invalid request body
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Internal server error
    get:
      operationId: listConversations
      summary: List conversations
      tags:
        - Conversations
      description: Retrieve conversations with cursor-based pagination. Returns up to
        10 conversations by default.
      parameters:
        - schema:
            default: 10
            type: integer
            exclusiveMinimum: true
            maximum: 100
          in: query
          name: limit
          required: false
          description: Number of conversations to fetch (1-100, default 10)
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: query
          name: cursor
          required: false
          description: Pagination cursor for fetching the next page of conversations
      responses:
        "200":
          description: Paginated list of conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                        title:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                      required:
                        - id
                        - title
                        - createdAt
                      additionalProperties: false
                  nextCursor:
                    nullable: true
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                  hasMore:
                    type: boolean
                required:
                  - conversations
                  - nextCursor
                  - hasMore
                additionalProperties: false
                description: Paginated list of conversations
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Internal server error
  /api/conversations/search:
    get:
      operationId: searchConversations
      summary: Search conversations
      tags:
        - Conversations
      description: Search conversations by title. Returns matching conversations
        ordered by creation date.
      parameters:
        - schema:
            type: string
            minLength: 1
          in: query
          name: q
          required: true
          description: Search query to filter conversations by title
      responses:
        "200":
          description: Matching conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                      pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                    title:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                      pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  required:
                    - id
                    - title
                    - createdAt
                  additionalProperties: false
                description: Matching conversations
        "400":
          description: Invalid search query
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Invalid search query
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: string
                  message:
                    type: string
                required:
                  - success
                  - error
                  - message
                additionalProperties: false
                description: Internal server error
