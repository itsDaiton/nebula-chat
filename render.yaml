services:
  - type: web
    name: nebula-chat-server
    runtime: node
    rootDir: .
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@10.26.2 --activate && pnpm install --frozen-lockfile && pnpm --filter nebula-chat-server run build
    startCommand: corepack enable && corepack prepare pnpm@10.26.2 --activate && pnpm --filter nebula-chat-server run start
    healthCheckPath: /health
    autoDeployTrigger: off

  - type: web
    name: nebula-chat-client
    runtime: static
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@10.26.2 --activate && pnpm install --frozen-lockfile && pnpm --filter nebula-chat-client run build
    staticPublishPath: apps/nebula-chat-client/build
    pullRequestPreviewsEnabled: true
    autoDeployTrigger: off

# Optional environment variables can be managed in Render dashboard/secrets.
# Keep Root Directory at repo root for pnpm workspace catalog resolution.
