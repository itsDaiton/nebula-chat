name: nebula-chat-client

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            relevant:
              - 'frontend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.ts'
              - 'prettier.config.cjs'
              - '.github/workflows/nebula-chat-client.yml'

  build:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    name: Build nebula-chat-client
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v4
        with:
          version: 10.26.2
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.22.1
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Lint
        run: pnpm exec eslint --report-unused-disable-directives --max-warnings=0 frontend/
      - name: Format check
        run: pnpm exec prettier --check frontend/
      - name: TypeScript check
        run: pnpm --filter nebula-chat-client run typecheck
      - name: Build
        run: pnpm --filter nebula-chat-client run build
