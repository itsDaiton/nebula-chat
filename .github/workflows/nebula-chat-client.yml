name: nebula-chat-client

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'frontend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.ts'
              - 'prettier.config.cjs'
              - '.github/workflows/nebula-chat-client.yml'

  build:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    name: Build nebula-chat-client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm exec eslint --report-unused-disable-directives --max-warnings=0 frontend/
      - run: pnpm exec prettier --check frontend/
      - run: pnpm --filter nebula-chat-client run typecheck
      - run: pnpm --filter nebula-chat-client run build

  # Required if this is a protected branch check
  status-check:
    needs: [changes, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.changes.outputs.relevant }}" == "false" ]]; then
            echo "Skipped — no relevant changes."
          elif [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "Build passed."
          else
            echo "Build failed." && exit 1
          fi