name: Build nebula-chat-client

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SONAR_QUALITY_GATE_ENFORCED: ${{ vars.SONAR_QUALITY_GATE_ENFORCED }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            relevant:
              - 'apps/nebula-chat-client/**'
              - 'scripts/post-sonar-quality-comment.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.ts'
              - 'prettier.config.cjs'
              - '.github/workflows/nebula-chat-client.yml'

  build:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.relevant == 'true'
    name: build-client
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4
        with:
          version: 10.26.2
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.1
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Lint
        run: pnpm exec eslint --report-unused-disable-directives --max-warnings=0 apps/nebula-chat-client/ scripts/post-sonar-quality-comment.ts
      - name: Format check
        run: pnpm exec prettier --check apps/nebula-chat-client/ scripts/post-sonar-quality-comment.ts
      - name: TypeScript check
        run: pnpm --filter nebula-chat-client run typecheck
      - name: Build
        run: pnpm --filter nebula-chat-client run build

  sonar:
    needs:
      - changes
      - build
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.relevant == 'true'
    name: sonar-client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: SonarQube Scan for Nebula Chat Client
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        with:
          projectBaseDir: apps/nebula-chat-client
          args: >
            -Dsonar.projectKey=itsDaiton_nebula-chat-client
            -Dsonar.organization=itsdaiton
            -Dsonar.projectName=Nebula-Chat-Client
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/generated/**
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.coverage.exclusions=**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Evaluate SonarQube quality gate for Nebula Chat Client
        id: quality_gate
        if: env.SONAR_QUALITY_GATE_ENFORCED == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          scanMetadataReportFile: apps/nebula-chat-client/.scannerwork/report-task.txt
          pollingTimeoutSec: 300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Publish Sonar summary for client
        if: always()
        run: |
          report_file='apps/nebula-chat-client/.scannerwork/report-task.txt'
          dashboard_url=''
          if [ -f "${report_file}" ]; then
            dashboard_url="$(grep '^dashboardUrl=' "${report_file}" | cut -d= -f2-)"
          fi

          {
            echo '## Sonar Scan Summary'
            echo ''
            echo '- App: nebula-chat-client'
            echo '- Project key: itsDaiton_nebula-chat-client'
            echo '- Quality gate: ${{ steps.quality_gate.outputs.quality-gate-status || 'SKIPPED (set SONAR_QUALITY_GATE_ENFORCED=true to enforce)' }}'
            if [ -n "${dashboard_url}" ]; then
              echo "- Dashboard: ${dashboard_url}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Set up Node.js for Sonar PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.1
      - name: Comment quality gate for client in PR
        if: github.event_name == 'pull_request' && always()
        run: npx --yes tsx scripts/post-sonar-quality-comment.ts
        env:
          APP_NAME: nebula-chat-client
          SONAR_PROJECT_KEY: itsDaiton_nebula-chat-client
          SONAR_QUALITY_GATE_STATUS: ${{ steps.quality_gate.outputs.quality-gate-status || 'UNKNOWN' }}
          SONAR_REPORT_PATH: apps/nebula-chat-client/.scannerwork/report-task.txt
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
