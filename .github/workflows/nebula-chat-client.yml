name: nebula-chat-client

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'frontend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.ts'
              - 'prettier.config.cjs'
              - '.github/workflows/nebula-chat-client.yml'

  build:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    name: Build nebula-chat-client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm exec eslint --report-unused-disable-directives --max-warnings=0 frontend/
      - name: Format check
        run: pnpm exec prettier --check frontend/
      - name: TypeScript check
        run: pnpm --filter nebula-chat-client run typecheck
      - name: Build
        run: pnpm --filter nebula-chat-client run build
