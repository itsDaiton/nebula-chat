name: Build nebula-chat-client

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            relevant:
              - 'apps/nebula-chat-client/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.ts'
              - 'prettier.config.cjs'
              - '.github/workflows/nebula-chat-client.yml'

  build:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.relevant == 'true'
    name: build-client
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v4
        with:
          version: 10.26.2
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.1
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Lint
        run: pnpm exec eslint --report-unused-disable-directives --max-warnings=0 apps/nebula-chat-client/
      - name: Format check
        run: pnpm exec prettier --check apps/nebula-chat-client/
      - name: TypeScript check
        run: pnpm --filter nebula-chat-client run typecheck
      - name: Build
        run: pnpm --filter nebula-chat-client run build

  sonar:
    needs:
      - changes
      - build
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.relevant == 'true'
    name: sonar-client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: SonarQube Scan for Nebula Chat Client
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        with:
          projectBaseDir: apps/nebula-chat-client
          args: >
            -Dsonar.projectKey=itsDaiton_nebula-chat-client
            -Dsonar.organization=itsdaiton
            -Dsonar.projectName=Nebula-Chat-Client
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/generated/**
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.coverage.exclusions=**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Evaluate SonarQube quality gate for Nebula Chat Client
        id: quality_gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          scanMetadataReportFile: apps/nebula-chat-client/.scannerwork/report-task.txt
          pollingTimeoutSec: 300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Publish Sonar summary for client
        if: always()
        run: |
          report_file='apps/nebula-chat-client/.scannerwork/report-task.txt'
          dashboard_url=''
          if [ -f "${report_file}" ]; then
            dashboard_url="$(grep '^dashboardUrl=' "${report_file}" | cut -d= -f2-)"
          fi

          {
            echo '## Sonar Scan Summary'
            echo ''
            echo '- App: nebula-chat-client'
            echo '- Project key: itsDaiton_nebula-chat-client'
            echo '- Quality gate: ${{ steps.quality_gate.outputs.quality-gate-status }}'
            if [ -n "${dashboard_url}" ]; then
              echo "- Dashboard: ${dashboard_url}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Comment quality gate for client in PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          QUALITY_GATE_STATUS: ${{ steps.quality_gate.outputs.quality-gate-status }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          script: |
            const fs = require('node:fs');

            const marker = '<!-- sonar-quality-gate:nebula-chat-client -->';
            const status = process.env.QUALITY_GATE_STATUS || 'UNKNOWN';
            const icon = status === 'PASSED' ? '✅' : status === 'FAILED' ? '❌' : '⚠️';
            const statusText = status === 'PASSED' ? 'passed' : status === 'FAILED' ? 'failed' : status.toLowerCase();
            const statusTitle = status === 'PASSED' ? 'Quality Gate passed for nebula-chat-client' : status === 'FAILED' ? 'Quality Gate failed for nebula-chat-client' : `Quality Gate ${statusText} for nebula-chat-client`;
            const badgeName = status === 'PASSED' ? 'qg-passed-20px.png' : status === 'FAILED' ? 'qg-failed-20px.png' : 'qg-passed-20px.png';
            const reportPath = 'apps/nebula-chat-client/.scannerwork/report-task.txt';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const timestampDisplay = new Date().toLocaleString('en-US', {
              dateStyle: 'medium',
              timeStyle: 'medium',
            });
            const projectKey = 'itsDaiton_nebula-chat-client';
            const prNumber = context.issue.number;
            const sonarToken = process.env.SONAR_TOKEN || '';
            const sonarAuth = sonarToken
              ? `Basic ${Buffer.from(`${sonarToken}:`).toString('base64')}`
              : '';

            const badgeBaseUrl = 'https://sonarsource.github.io/sonarcloud-github-static-resources/v2';
            const statusIconPassed = `${badgeBaseUrl}/common/passed-16px.png`;
            const statusIconFailed = `${badgeBaseUrl}/common/failed-16px.png`;
            const statusIconAccepted = `${badgeBaseUrl}/common/accepted-16px.png`;

            const newIssuesUrl = `https://sonarcloud.io/project/issues?id=${projectKey}&pullRequest=${prNumber}&issueStatuses=OPEN,CONFIRMED&sinceLeakPeriod=true`;
            const acceptedIssuesUrl = `https://sonarcloud.io/project/issues?id=${projectKey}&pullRequest=${prNumber}&issueStatuses=ACCEPTED`;
            const hotspotsUrl = `https://sonarcloud.io/project/security_hotspots?id=${projectKey}&pullRequest=${prNumber}&issueStatuses=OPEN,CONFIRMED&sinceLeakPeriod=true`;
            const coverageUrl = `https://sonarcloud.io/component_measures?id=${projectKey}&pullRequest=${prNumber}&metric=new_coverage&view=list`;
            const duplicationUrl = `https://sonarcloud.io/component_measures?id=${projectKey}&pullRequest=${prNumber}&metric=new_duplicated_lines_density&view=list`;

            const fetchJson = async (url) => {
              if (!sonarToken) return null;
              try {
                const response = await fetch(url, {
                  headers: {
                    Authorization: sonarAuth,
                  },
                });
                if (!response.ok) {
                  return null;
                }
                return await response.json();
              } catch {
                return null;
              }
            };

            const formatCount = (value) => (Number.isFinite(value) ? `${value}` : '0');
            const formatPercent = (value) => {
              const numeric = Number(value);
              return Number.isFinite(numeric) ? `${numeric.toFixed(1)}%` : '0.0%';
            };

            let dashboardUrl = '';
            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              const match = report.match(/^dashboardUrl=(.*)$/m);
              dashboardUrl = match ? match[1].trim() : '';
            }

            const [newIssuesData, acceptedIssuesData, hotspotsData, measuresData] = await Promise.all([
              fetchJson(`https://sonarcloud.io/api/issues/search?componentKeys=${projectKey}&pullRequest=${prNumber}&issueStatuses=OPEN,CONFIRMED&sinceLeakPeriod=true&ps=1`),
              fetchJson(`https://sonarcloud.io/api/issues/search?componentKeys=${projectKey}&pullRequest=${prNumber}&issueStatuses=ACCEPTED&ps=1`),
              fetchJson(`https://sonarcloud.io/api/hotspots/search?projectKey=${projectKey}&pullRequest=${prNumber}&ps=1`),
              fetchJson(`https://sonarcloud.io/api/qualitygates/project_status?projectKey=${projectKey}&pullRequest=${prNumber}`),
            ]);

            const newIssuesCount = typeof newIssuesData?.total === 'number' ? newIssuesData.total : NaN;
            const acceptedIssuesCount = typeof acceptedIssuesData?.total === 'number' ? acceptedIssuesData.total : NaN;
            const hotspotCount = typeof hotspotsData?.total === 'number' ? hotspotsData.total : NaN;

            const conditions = Array.isArray(measuresData?.projectStatus?.conditions)
              ? measuresData.projectStatus.conditions
              : [];
            const getMeasureValue = (metricKey) => {
              const condition = conditions.find((item) => item.metricKey === metricKey);
              return condition?.actualValue ?? condition?.value;
            };

            const coverageText = formatPercent(getMeasureValue('new_coverage'));
            const duplicationText = formatPercent(getMeasureValue('new_duplicated_lines_density'));

            const issueIcon = Number.isFinite(newIssuesCount) && newIssuesCount > 0 ? statusIconFailed : statusIconPassed;
            const hotspotIcon = Number.isFinite(hotspotCount) && hotspotCount > 0 ? statusIconFailed : statusIconPassed;

            const body = [
              marker,
              `## [![${statusTitle}](${badgeBaseUrl}/checks/QualityGateBadge/${badgeName})](${dashboardUrl || runUrl}) **${statusTitle}**`,
              '',
              'Issues',
              `![](${issueIcon}) [${formatCount(newIssuesCount)} New issues](${newIssuesUrl})`,
              `![](${statusIconAccepted}) [${formatCount(acceptedIssuesCount)} Accepted issues](${acceptedIssuesUrl})`,
              '',
              'Measures',
              `![](${hotspotIcon}) [${formatCount(hotspotCount)} Security Hotspots](${hotspotsUrl})`,
              `![](${statusIconPassed}) [${coverageText} Coverage on New Code](${coverageUrl})`,
              `![](${statusIconPassed}) [${duplicationText} Duplication on New Code](${duplicationUrl})`,
              '',
              `[See analysis details on SonarQube Cloud](${dashboardUrl || runUrl})`,
              '',
              `_${icon} App: nebula-chat-client | Updated: ${timestampDisplay} | [Workflow run](${runUrl})_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
