name: Build nebula-chat-client

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            relevant:
              - 'apps/nebula-chat-client/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.ts'
              - 'prettier.config.cjs'
              - '.github/workflows/nebula-chat-client.yml'

  build:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    name: Build nebula-chat-client
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v4
        with:
          version: 10.26.2
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.1
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Lint
        run: pnpm exec eslint --report-unused-disable-directives --max-warnings=0 apps/nebula-chat-client/
      - name: Format check
        run: pnpm exec prettier --check apps/nebula-chat-client/
      - name: TypeScript check
        run: pnpm --filter nebula-chat-client run typecheck
      - name: Build
        run: pnpm --filter nebula-chat-client run build
      - name: SonarQube Scan for Nebula Chat Client
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        with:
          projectBaseDir: apps/nebula-chat-client
          args: >
            -Dsonar.projectKey=itsDaiton_nebula-chat-client
            -Dsonar.organization=itsdaiton
            -Dsonar.projectName=Nebula-Chat-Client
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/generated/**
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.coverage.exclusions=**/*
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Evaluate SonarQube quality gate for Nebula Chat Client
        id: client_quality_gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        continue-on-error: true
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Load open SonarQube issues for Nebula Chat Client
        id: client_open_issues
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          trap 'rm -f "${response_file}"' EXIT
          status_code="$(curl -sSL -H "Authorization: Bearer ${SONAR_TOKEN}" -w '%{http_code}' -o "${response_file}" "${SONAR_HOST_URL}/api/issues/search?componentKeys=itsDaiton_nebula-chat-client&resolved=false&ps=1")"
          if [ "${status_code}" != '200' ]; then
            echo "Failed to load SonarQube issues for Nebula Chat Client (HTTP ${status_code})."
            echo 'Verify SONAR_TOKEN is configured and SonarCloud is reachable.'
            cat "${response_file}"
            exit 1
          fi
          open_issues="$(jq -r '.total // empty' "${response_file}")"
          if ! [[ "${open_issues}" =~ ^[0-9]+$ ]]; then
            echo 'SonarQube API response did not include a numeric "total" field.'
            echo "Received value: '${open_issues}'"
            cat "${response_file}"
            exit 1
          fi
          echo "open_issues=${open_issues}" >> "${GITHUB_OUTPUT}"
      - name: Quality Gate passed for Nebula Chat Client
        if: ${{ steps.client_quality_gate.outputs.quality-gate-status == 'PASSED' && steps.client_open_issues.outputs.open_issues == '0' }}
        run: |
          echo 'Quality gate passed and no open SonarQube issues were found for Nebula Chat Client.'
      - name: Quality Gate failed for Nebula Chat Client
        if: ${{ steps.client_quality_gate.outputs.quality-gate-status != 'PASSED' || steps.client_open_issues.outputs.open_issues != '0' }}
        run: |
          echo "quality-gate-status=${{ steps.client_quality_gate.outputs.quality-gate-status }}"
          echo "open-issues=${{ steps.client_open_issues.outputs.open_issues }}"
          exit 1
