name: nebula-chat-client

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'eslint.config.ts'
      - 'prettier.config.cjs'
      - '.github/workflows/nebula-chat-client.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'eslint.config.ts'
      - 'prettier.config.cjs'
      - '.github/workflows/nebula-chat-client.yml'

jobs:
  build:
    name: Build nebula-chat-client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm exec eslint --report-unused-disable-directives --max-warnings=0 frontend/

      - name: Format check
        run: pnpm exec prettier --check frontend/

      - name: TypeScript check
        run: pnpm --filter nebula-chat-client run typecheck

      - name: Build
        run: pnpm --filter nebula-chat-client run build
