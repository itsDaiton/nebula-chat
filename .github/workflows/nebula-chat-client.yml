name: nebula-chat-client

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'frontend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.ts'
              - 'prettier.config.cjs'
              - '.github/workflows/nebula-chat-client.yml'

  build:
    name: Build nebula-chat-client
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm exec eslint --report-unused-disable-directives --max-warnings=0 frontend/

      - name: Format check
        run: pnpm exec prettier --check frontend/

      - name: TypeScript check
        run: pnpm --filter nebula-chat-client run typecheck

      - name: Build
        run: pnpm --filter nebula-chat-client run build

  result:
    name: nebula-chat-client result
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - run: |
          result="${{ needs.build.result }}"
          if [[ $result == "success" || $result == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi
