name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Enable auto-merge on release PR
        if: ${{ steps.release.outputs.pr_number }}
        run: gh pr merge --auto --squash ${{ steps.release.outputs.pr_number }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
