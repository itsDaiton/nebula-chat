name: Deploy nebula-chat-client

on:
  push:
    tags: ['nebula-chat-client-v*']
  workflow_dispatch:

permissions: {}

jobs:
  deploy:
    name: Deploy nebula-chat-client
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_CLIENT_DEPLOY_HOOK }}
        run: curl -fSs --retry 3 -X POST "$DEPLOY_HOOK"
