name: Deploy nebula-chat-server

on:
  push:
    tags: ['nebula-chat-server-v*']
  workflow_dispatch:

permissions: {}

jobs:
  deploy:
    name: Deploy nebula-chat-server
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -fSs --retry 3 -X POST "${{ secrets.RENDER_SERVER_DEPLOY_HOOK }}"
