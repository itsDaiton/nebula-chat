name: Build nebula-chat-server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            relevant:
              - 'apps/nebula-chat-server/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.ts'
              - 'prettier.config.cjs'
              - '.github/workflows/nebula-chat-server.yml'

  build:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    name: Build nebula-chat-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v4
        with:
          version: 10.26.2
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.1
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --ignore-scripts
      - name: Lint
        run: pnpm exec eslint --report-unused-disable-directives --max-warnings=0 apps/nebula-chat-server/
      - name: Format check
        run: pnpm exec prettier --check apps/nebula-chat-server/
      - name: Prisma generate
        run: pnpm --filter nebula-chat-server run prisma:generate
      - name: TypeScript check
        run: pnpm --filter nebula-chat-server run typecheck
      - name: Build
        run: pnpm --filter nebula-chat-server run build
      - name: SonarQube Scan (Server)
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        with:
          projectBaseDir: apps/nebula-chat-server
          args: >
            -Dsonar.projectKey=itsDaiton_nebula-chat-server
            -Dsonar.organization=itsdaiton
            -Dsonar.projectName=nebula-chat-server
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/generated/**
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.coverage.exclusions=**/*
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarQube Quality Gate (Server)
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
